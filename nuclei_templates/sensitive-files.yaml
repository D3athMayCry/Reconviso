id: custom-sensitive-files-extended

info:
  name: Extended Sensitive Files Detection
  author: OSINT Recon Pipeline
  severity: high
  description: Detecta arquivos sensiveis expostos publicamente.
  tags: exposure,config,osint,recon
  classification:
    cvss-score: 7.5
    cwe-id: CWE-200

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.development"
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.old"
      - "{{BaseURL}}/config/.env"
      - "{{BaseURL}}/app/.env"
      - "{{BaseURL}}/.git/config"
      - "{{BaseURL}}/.git/HEAD"
      - "{{BaseURL}}/.git/index"
      - "{{BaseURL}}/.git/logs/HEAD"
      - "{{BaseURL}}/.gitignore"
      - "{{BaseURL}}/.git-credentials"
      - "{{BaseURL}}/config.php"
      - "{{BaseURL}}/config.php.bak"
      - "{{BaseURL}}/configuration.php"
      - "{{BaseURL}}/config.json"
      - "{{BaseURL}}/config.yml"
      - "{{BaseURL}}/config.yaml"
      - "{{BaseURL}}/settings.php"
      - "{{BaseURL}}/settings.json"
      - "{{BaseURL}}/app/config/config.yml"
      - "{{BaseURL}}/database.sql"
      - "{{BaseURL}}/db.sql"
      - "{{BaseURL}}/backup.sql"
      - "{{BaseURL}}/dump.sql"
      - "{{BaseURL}}/database.sqlite"
      - "{{BaseURL}}/backup.zip"
      - "{{BaseURL}}/backup.tar.gz"
      - "{{BaseURL}}/www.zip"
      - "{{BaseURL}}/web.config"
      - "{{BaseURL}}/.htaccess"
      - "{{BaseURL}}/.htpasswd"
      - "{{BaseURL}}/nginx.conf"
      - "{{BaseURL}}/Dockerfile"
      - "{{BaseURL}}/docker-compose.yml"
      - "{{BaseURL}}/.gitlab-ci.yml"
      - "{{BaseURL}}/.travis.yml"
      - "{{BaseURL}}/Jenkinsfile"
      - "{{BaseURL}}/composer.json"
      - "{{BaseURL}}/package.json"
      - "{{BaseURL}}/requirements.txt"
      - "{{BaseURL}}/.aws/credentials"
      - "{{BaseURL}}/credentials.json"
      - "{{BaseURL}}/secrets.json"
      - "{{BaseURL}}/private-key.pem"
      - "{{BaseURL}}/id_rsa"
      - "{{BaseURL}}/error.log"
      - "{{BaseURL}}/debug.log"
      - "{{BaseURL}}/phpinfo.php"
      - "{{BaseURL}}/info.php"
      - "{{BaseURL}}/.DS_Store"
      - "{{BaseURL}}/wp-config.php"
      - "{{BaseURL}}/wp-config.php.bak"
      - "{{BaseURL}}/sites/default/settings.php"
      - "{{BaseURL}}/config/database.yml"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        condition: or
        words:
          - "DB_PASSWORD"
          - "API_KEY"
          - "SECRET_KEY"
          - "AWS_SECRET"
          - "[core]"
          - "<?php"
          - "root:"
          - "password"
          - "token"
          - "credentials"
      - type: dsl
        dsl:
          - "len(body) > 50"
    extractors:
      - type: regex
        name: credentials
        group: 1
        regex:
          - "(?i)(password|passwd|pwd|secret|token|api[_-]?key)\\s*[:=]\\s*[\"']?([^\\s\"'\\n]{6,})"
          - "(?i)(DB_[A-Z_]+)\\s*=\\s*[\"']?([^\\s\"'\\n]+)"
          - "(?i)(AWS_[A-Z_]+)\\s*=\\s*[\"']?([^\\s\"'\\n]+)"
      - type: regex
        name: db_conn
        regex:
          - "(?i)(mysql|postgresql|mongodb|redis|sqlite)://([^\\s\\n]+)"
