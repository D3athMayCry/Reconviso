# ╔══════════════════════════════════════════════════════════════════════════╗
# ║          🥷 ADVANCED OSINT & RECON FRAMEWORK — AI-Powered               ║
# ║                                                                          ║
# ║  SECRETS NECESSÁRIOS (Settings → Secrets → Actions):                    ║
# ║    GEMINI_API_KEY       → aistudio.google.com/app/apikey                ║
# ║    SHODAN_API_KEY       → account.shodan.io (opcional, grátis limitado) ║
# ║    SECURITYTRAILS_KEY   → securitytrails.com (opcional)                 ║
# ║    GITHUB_TOKEN         → injetado automaticamente                       ║
# ║                                                                          ║
# ║  FASES:                                                                  ║
# ║    1 → Passive Recon   (subfinder, dnsx, SSL/TLS, Wayback)              ║
# ║    2 → OSINT Analysis  (Dorks, emails, params, Shodan)                  ║
# ║    3 → Active Recon    (httpx, ffuf, form detection, JS analysis)       ║
# ║    4 → Vuln Scan       (Nuclei + custom templates)                      ║
# ║    5 → Data Processing (normalize, dedup, classify, enrich)             ║
# ║    6 → AI Report       (Gemini correlação + attack chains)              ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: 🥷 Advanced OSINT & Recon — AI Report

on:
  workflow_dispatch:
    inputs:
      target:
        description: '🎯 Target Domain (ex: example.com)'
        required: true
        type: string
      scope:
        description: '📐 Scope (ex: *.example.com,example.com | vazio = auto)'
        required: false
        default: ''
      stealth_level:
        description: '🔇 Stealth Level'
        required: false
        type: choice
        options:
          - ultra   # 3 req/s — máximo furtivo, lento
          - low     # 5 req/s — discreto (recomendado)
          - normal  # 15 req/s — balanceado
        default: low
      scan_mode:
        description: '🔬 Scan Mode'
        required: true
        type: choice
        options:
          - 'Discovery  — Rápido: só exposições e configs'
          - 'Targeted   — Inteligente: adapta à tecnologia'
          - 'Aggressive — Completo: todos os templates'
        default: 'Targeted   — Inteligente: adapta à tecnologia'
      nuclei_severities:
        description: '🚨 Nuclei Severities (comma-separated)'
        required: false
        default: 'low,medium,high,critical'
        type: string
      max_targets:
        description: '🔢 Max Subdomains to Scan'
        required: false
        default: '500'
        type: string
      enable_dorks:
        description: '🎣 Habilitar Google/GitHub Dorks?'
        type: boolean
        default: true
      enable_portscan:
        description: '🔌 Habilitar Port Scan rápido?'
        type: boolean
        default: true
      enable_screenshots:
        description: '📸 Habilitar Screenshots?'
        type: boolean
        default: false

env:
  SCAN_ID: ${{ github.run_id }}
  GO_VERSION: '1.23'

# ══════════════════════════════════════════════════════════════════════════════
# JOB 0 ── SETUP
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  setup:
    name: ⚙️ Setup & Config
    runs-on: ubuntu-latest
    outputs:
      domain:    ${{ steps.extract.outputs.domain }}
      scope:     ${{ steps.extract.outputs.scope }}
      max_rate:  ${{ steps.stealth.outputs.max_rate }}
      threads:   ${{ steps.stealth.outputs.threads }}
      main_ip:   ${{ steps.meta.outputs.main_ip }}
      asn:       ${{ steps.meta.outputs.asn }}
      org:       ${{ steps.meta.outputs.org }}
      registrar: ${{ steps.meta.outputs.registrar }}
      tech_hint: ${{ steps.meta.outputs.tech_hint }}

    steps:
      - name: Extract Domain & Scope
        id: extract
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.target }}" \
            | sed 's|https\?://||;s|/.*||' | tr '[:upper:]' '[:lower:]' | xargs)
          SCOPE="${{ github.event.inputs.scope }}"
          [ -z "$SCOPE" ] && SCOPE="*.${DOMAIN},${DOMAIN}"
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE"   >> $GITHUB_OUTPUT
          echo "✅ Domain → $DOMAIN | Scope → $SCOPE"

      - name: Stealth Profile
        id: stealth
        run: |
          case "${{ github.event.inputs.stealth_level }}" in
            ultra)  MAX_RATE=3;  THREADS=5  ;;
            low)    MAX_RATE=5;  THREADS=10 ;;
            normal) MAX_RATE=15; THREADS=25 ;;
            *)      MAX_RATE=5;  THREADS=10 ;;
          esac
          echo "max_rate=$MAX_RATE" >> $GITHUB_OUTPUT
          echo "threads=$THREADS"   >> $GITHUB_OUTPUT

      - name: Collect ASN / WHOIS / Tech Metadata
        id: meta
        run: |
          DOMAIN="${{ steps.extract.outputs.domain }}"
          MAIN_IP=$(dig +short "$DOMAIN" | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1 || echo "unknown")
          ASN=$(curl -s "https://api.hackertarget.com/aslookup/?q=$MAIN_IP" 2>/dev/null \
                | grep -oP 'AS\d+' | head -1 || echo "unknown")
          ORG=$(whois "$DOMAIN" 2>/dev/null \
                | grep -iE '^(org|organisation|registrant org)' \
                | head -1 | cut -d: -f2- | xargs || echo "unknown")
          REG=$(whois "$DOMAIN" 2>/dev/null \
                | grep -i 'registrar:' | head -1 | cut -d: -f2- | xargs || echo "unknown")
          TECH=$(curl -sk -o /dev/null -D - "https://$DOMAIN" 2>/dev/null \
                 | grep -i '^server:' | cut -d: -f2- | xargs || echo "unknown")
          echo "main_ip=$MAIN_IP"   >> $GITHUB_OUTPUT
          echo "asn=$ASN"           >> $GITHUB_OUTPUT
          echo "org=$ORG"           >> $GITHUB_OUTPUT
          echo "registrar=$REG"     >> $GITHUB_OUTPUT
          echo "tech_hint=$TECH"    >> $GITHUB_OUTPUT
          echo "🌐 IP=$MAIN_IP | ASN=$ASN | Server=$TECH"

# ══════════════════════════════════════════════════════════════════════════════
# FASE 1 ── PASSIVE RECON (paralelo por matrix)
# Tech Detection + DNS Enum + SSL/TLS Analysis + Wayback Machine
# ══════════════════════════════════════════════════════════════════════════════
  phase1-passive:
    name: "🔍 Phase1 — ${{ matrix.type }}"
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        type: [subdomains, dns-ssl, wayback, tech-detection]

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install Tools
        run: |
          case "${{ matrix.type }}" in
            "subdomains")
              go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest &
              go install github.com/glebarez/cero@latest &
              wait ;;
            "dns-ssl")
              go install github.com/projectdiscovery/dnsx/cmd/dnsx@latest &
              go install github.com/projectdiscovery/tlsx/cmd/tlsx@latest &
              wait ;;
            "wayback")
              go install github.com/lc/gau/v2/cmd/gau@latest &
              go install github.com/tomnomnom/waybackurls@latest &
              go install github.com/tomnomnom/unfurl@latest &
              wait ;;
            "tech-detection")
              go install github.com/projectdiscovery/httpx/cmd/httpx@latest ;;
          esac

      - name: Run — ${{ matrix.type }}
        env:
          DOMAIN: ${{ needs.setup.outputs.domain }}
          MAIN_IP: ${{ needs.setup.outputs.main_ip }}
        run: |
          mkdir -p output

          case "${{ matrix.type }}" in

            # ──────────────────────────────────────────────────────────────
            # SUBDOMAIN ENUMERATION
            # subfinder + crt.sh + RapidDNS + BufferOver + cero
            # ──────────────────────────────────────────────────────────────
            "subdomains")
              echo "=== subfinder ==="
              subfinder -d "$DOMAIN" -silent -t 50 -all \
                -o output/subfinder.txt 2>/dev/null || true

              echo "=== crt.sh ==="
              curl -s "https://crt.sh/?q=%25.$DOMAIN&output=json" \
                | jq -r '.[].name_value' 2>/dev/null \
                | sed 's/\*\.//g' | sort -u > output/crtsh.txt || true

              echo "=== RapidDNS ==="
              curl -s "https://rapiddns.io/subdomain/$DOMAIN?full=1" 2>/dev/null \
                | grep -oP '(?<=<td>)[a-z0-9._-]+\.'$DOMAIN'(?=</td>)' \
                | sort -u > output/rapiddns.txt || true

              echo "=== BufferOver ==="
              curl -s "https://dns.bufferover.run/dns?q=.$DOMAIN" 2>/dev/null \
                | jq -r '.FDNS_A[],.RDNS[]' 2>/dev/null \
                | cut -d',' -f2 | grep -F ".$DOMAIN" \
                | sort -u > output/bufferover.txt || true

              echo "=== cero (cert SANs) ==="
              cero "$DOMAIN" 2>/dev/null | sort -u > output/cero.txt || true

              echo "=== Merge & deduplicate ==="
              cat output/subfinder.txt output/crtsh.txt output/rapiddns.txt \
                  output/bufferover.txt output/cero.txt 2>/dev/null \
                | grep -vE '@|^\s*$' | sort -u > output/subdomains.txt
              echo "$DOMAIN" >> output/subdomains.txt
              sort -u -o output/subdomains.txt output/subdomains.txt
              echo "📦 $(wc -l < output/subdomains.txt) subdomains"
              ;;

            # ──────────────────────────────────────────────────────────────
            # DNS ENUMERATION + SSL/TLS ANALYSIS
            # dnsx (A,MX,TXT,NS,CNAME,SOA) + zone transfer + SPF/DMARC/DKIM
            # tlsx para cert fingerprint + wildcards
            # ──────────────────────────────────────────────────────────────
            "dns-ssl")
              echo "=== DNS full enumeration ==="
              echo "$DOMAIN" | dnsx -silent -json \
                -a -aaaa -cname -mx -txt -ns -soa -ptr \
                -o output/dns_full.json 2>/dev/null || true

              echo "=== Zone Transfer attempt ==="
              for NS in $(dig +short NS "$DOMAIN" 2>/dev/null); do
                dig axfr "$DOMAIN" @"$NS" 2>/dev/null \
                  >> output/zone_transfer.txt || true
              done

              echo "=== Email Security (SPF/DMARC/DKIM) ==="
              {
                echo "--- SPF ---"
                dig +short TXT "$DOMAIN" | grep -i 'v=spf' || echo "NO SPF FOUND"
                echo "--- DMARC ---"
                dig +short TXT "_dmarc.$DOMAIN" || echo "NO DMARC FOUND"
                echo "--- DKIM (common selectors) ---"
                for SEL in default google amazon ses mail dkim k1 smtp selector1; do
                  RESULT=$(dig +short TXT "${SEL}._domainkey.$DOMAIN" 2>/dev/null)
                  [ -n "$RESULT" ] && echo "selector=$SEL → $RESULT"
                done
              } > output/email_security.txt

              echo "=== SSL/TLS Analysis (tlsx) ==="
              echo "$DOMAIN" | tlsx -silent -json \
                -san -cn -expired -self-signed \
                -o output/tls_analysis.json 2>/dev/null || true

              echo "=== Cert History (crt.sh) ==="
              curl -s "https://crt.sh/?q=$DOMAIN&output=json" 2>/dev/null \
                | jq -r '.[] | "\(.not_after) | \(.issuer_name) | \(.name_value)"' \
                | sort -u > output/cert_details.txt || true
              ;;

            # ──────────────────────────────────────────────────────────────
            # WAYBACK MACHINE → URLs Database
            # gau + waybackurls → params + paths + juicy files + APIs
            # ──────────────────────────────────────────────────────────────
            "wayback")
              echo "=== GAU (web archive) ==="
              gau --threads 5 --subs --retries 3 "$DOMAIN" \
                2>/dev/null > output/gau.txt || true

              echo "=== Wayback Machine ==="
              echo "$DOMAIN" | waybackurls 2>/dev/null \
                > output/wayback_raw.txt || true

              cat output/gau.txt output/wayback_raw.txt \
                | sort -u > output/urls_all.txt

              echo "=== Extract GET Params ==="
              cat output/urls_all.txt | unfurl keys | sort -u \
                > output/params_get.txt || true

              echo "=== Extract Paths ==="
              cat output/urls_all.txt | unfurl paths | sort -u \
                > output/paths.txt || true

              echo "=== Extract API Endpoints ==="
              grep -iE '/(api|v[0-9]+|graphql|rest|ws|rpc)/' output/paths.txt \
                | sort -u > output/api_endpoints.txt || true

              echo "=== Juicy Files ==="
              grep -iE '\.(env|log|bak|sql|config|xml|json|yaml|yml|key|pem|cer|pfx|p12|htpasswd|DS_Store|git|svn|swp|old|backup|conf|ini|toml|ovpn|rdp)(\?|$)' \
                output/urls_all.txt | sort -u > output/urls_juicy.txt || true

              echo "=== POST / Auth Endpoints ==="
              grep -iE '(login|signin|auth|upload|submit|register|reset|forgot|checkout|payment|transfer|oauth|callback|token|refresh)' \
                output/paths.txt | sort -u > output/post_endpoints.txt || true

              echo "📦 URLs: $(wc -l < output/urls_all.txt)"
              echo "📦 Params: $(wc -l < output/params_get.txt)"
              echo "📦 Juicy: $(wc -l < output/urls_juicy.txt)"
              echo "📦 APIs: $(wc -l < output/api_endpoints.txt)"
              ;;

            # ──────────────────────────────────────────────────────────────
            # TECH DETECTION
            # httpx tech-detect + favicon + robots + sitemap + WHOIS + analytics IDs
            # ──────────────────────────────────────────────────────────────
            "tech-detection")
              echo "=== Tech Detection via httpx ==="
              echo "$DOMAIN" | httpx -silent -timeout 10 \
                -title -server -td -favicon \
                -json -o output/tech_main.json 2>/dev/null || true

              echo "=== Robots.txt / Sitemap / security.txt ==="
              curl -sk "https://$DOMAIN/robots.txt"                   > output/robots.txt     2>/dev/null || true
              curl -sk "https://$DOMAIN/sitemap.xml"                  > output/sitemap.xml    2>/dev/null || true
              curl -sk "https://$DOMAIN/.well-known/security.txt"     > output/security_txt.txt 2>/dev/null || true
              curl -sk "https://$DOMAIN/humans.txt"                   > output/humans_txt.txt 2>/dev/null || true

              echo "=== WHOIS ==="
              whois "$DOMAIN" > output/whois.txt 2>/dev/null || true

              echo "=== Reverse IP (shared hosting check) ==="
              curl -s "https://api.hackertarget.com/reverseiplookup/?q=$MAIN_IP" \
                > output/reverse_ip.txt 2>/dev/null || true

              echo "=== Analytics IDs fingerprint ==="
              curl -sk "https://$DOMAIN" 2>/dev/null \
                | grep -oP '(UA-\d+-\d+|G-[A-Z0-9]+|GTM-[A-Z0-9]+|AW-\d+)' \
                | sort -u > output/analytics_ids.txt || true

              echo "=== URLScan history ==="
              curl -s "https://urlscan.io/api/v1/search/?q=domain:$DOMAIN&size=30" \
                2>/dev/null | jq '{total:.total, results:[.results[] | {url:.page.url, ip:.page.ip, country:.page.country, server:.page.server, date:.task.time}]}' \
                > output/urlscan.json || true
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: phase1-${{ matrix.type }}
          path: output/
          retention-days: 1

# ══════════════════════════════════════════════════════════════════════════════
# FASE 2 ── OSINT ANALYSIS
# Parameter Extraction → OSINT Scanning (Nuclei custom) + Dorks + Emails + Shodan
# ══════════════════════════════════════════════════════════════════════════════
  phase2-osint:
    name: "🎯 Phase2 — OSINT Analysis"
    runs-on: ubuntu-latest
    needs: [setup, phase1-passive]

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install Tools
        run: |
          pip install -q theHarvester requests shodan 2>/dev/null || true
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei -update-templates 2>/dev/null || true

      - uses: actions/download-artifact@v4
        with:
          pattern: phase1-*
          merge-multiple: true
          path: phase1/

      # ── Nuclei OSINT: Exposures + Configs + Admin Panels ──────────────────
      - name: Nuclei OSINT Scan (Custom Templates)
        env:
          MAX_RATE: ${{ needs.setup.outputs.max_rate }}
          THREADS:  ${{ needs.setup.outputs.threads }}
          DOMAIN:   ${{ needs.setup.outputs.domain }}
          SEVERITIES: ${{ github.event.inputs.nuclei_severities || 'low,medium,high,critical' }}
        run: |
          mkdir -p output/nuclei_osint /tmp/custom-tpl

          # ── Custom Template: Sensitive Files ──────────────────────────────
          cat > /tmp/custom-tpl/sensitive-files.yaml << 'YAML'
id: custom-sensitive-files-extended
info:
  name: Extended Sensitive Files Detection
  author: OSINT Recon Pipeline
  severity: high
  tags: exposure,config,osint,recon
http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.development"
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.old"
      - "{{BaseURL}}/config/.env"
      - "{{BaseURL}}/app/.env"
      - "{{BaseURL}}/.git/config"
      - "{{BaseURL}}/.git/HEAD"
      - "{{BaseURL}}/.git/index"
      - "{{BaseURL}}/.git/logs/HEAD"
      - "{{BaseURL}}/.gitignore"
      - "{{BaseURL}}/.git-credentials"
      - "{{BaseURL}}/config.php"
      - "{{BaseURL}}/config.php.bak"
      - "{{BaseURL}}/configuration.php"
      - "{{BaseURL}}/config.json"
      - "{{BaseURL}}/config.yml"
      - "{{BaseURL}}/config.yaml"
      - "{{BaseURL}}/settings.php"
      - "{{BaseURL}}/settings.json"
      - "{{BaseURL}}/app/config/config.yml"
      - "{{BaseURL}}/database.sql"
      - "{{BaseURL}}/db.sql"
      - "{{BaseURL}}/backup.sql"
      - "{{BaseURL}}/dump.sql"
      - "{{BaseURL}}/database.sqlite"
      - "{{BaseURL}}/backup.zip"
      - "{{BaseURL}}/backup.tar.gz"
      - "{{BaseURL}}/www.zip"
      - "{{BaseURL}}/public_html.zip"
      - "{{BaseURL}}/web.config"
      - "{{BaseURL}}/.htaccess"
      - "{{BaseURL}}/.htpasswd"
      - "{{BaseURL}}/nginx.conf"
      - "{{BaseURL}}/Dockerfile"
      - "{{BaseURL}}/docker-compose.yml"
      - "{{BaseURL}}/docker-compose.yaml"
      - "{{BaseURL}}/.gitlab-ci.yml"
      - "{{BaseURL}}/.travis.yml"
      - "{{BaseURL}}/Jenkinsfile"
      - "{{BaseURL}}/.github/workflows/deploy.yml"
      - "{{BaseURL}}/composer.json"
      - "{{BaseURL}}/package.json"
      - "{{BaseURL}}/requirements.txt"
      - "{{BaseURL}}/Pipfile"
      - "{{BaseURL}}/.aws/credentials"
      - "{{BaseURL}}/credentials.json"
      - "{{BaseURL}}/aws.json"
      - "{{BaseURL}}/secrets.json"
      - "{{BaseURL}}/tokens.json"
      - "{{BaseURL}}/private-key.pem"
      - "{{BaseURL}}/id_rsa"
      - "{{BaseURL}}/id_rsa.pub"
      - "{{BaseURL}}/error.log"
      - "{{BaseURL}}/debug.log"
      - "{{BaseURL}}/access.log"
      - "{{BaseURL}}/phpinfo.php"
      - "{{BaseURL}}/info.php"
      - "{{BaseURL}}/test.php"
      - "{{BaseURL}}/.DS_Store"
      - "{{BaseURL}}/wp-config.php"
      - "{{BaseURL}}/wp-config.php.bak"
      - "{{BaseURL}}/sites/default/settings.php"
      - "{{BaseURL}}/config/database.yml"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        condition: or
        words:
          - "DB_PASSWORD"
          - "API_KEY"
          - "SECRET_KEY"
          - "AWS_SECRET"
          - "[core]"
          - "<?php"
          - "root:"
          - "password"
          - "token"
          - "credentials"
      - type: dsl
        dsl:
          - 'len(body) > 50'
    extractors:
      - type: regex
        name: credentials
        group: 1
        regex:
          - '(?i)(password|passwd|pwd|secret|token|api[_-]?key)\s*[:=]\s*["\x27]?([^\s"\x27\n]{6,})'
          - '(?i)(DB_[A-Z_]+)\s*=\s*["\x27]?([^\s"\x27\n]+)'
          - '(?i)(AWS_[A-Z_]+)\s*=\s*["\x27]?([^\s"\x27\n]+)'
      - type: regex
        name: db_conn
        regex:
          - '(?i)(mysql|postgresql|mongodb|redis|sqlite)://([^\s\n]+)'
YAML

          # ── Custom Template: Admin Panels ─────────────────────────────────
          cat > /tmp/custom-tpl/admin-panels.yaml << 'YAML'
id: custom-admin-panels
info:
  name: Admin Panel Discovery
  author: OSINT Recon Pipeline
  severity: medium
  tags: panel,admin,login,dashboard
http:
  - method: GET
    path:
      - "{{BaseURL}}/admin"
      - "{{BaseURL}}/admin/"
      - "{{BaseURL}}/administrator"
      - "{{BaseURL}}/admin/login"
      - "{{BaseURL}}/admin/dashboard"
      - "{{BaseURL}}/wp-admin"
      - "{{BaseURL}}/wp-login.php"
      - "{{BaseURL}}/cpanel"
