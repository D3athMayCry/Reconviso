name: 🕵️ Full OSINT & Conviso Integration

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL (ex: https://example.com)'
        required: true
        type: string
      project_id:
        description: 'Conviso Project ID'
        required: true
        type: string
      asset_id:
        description: 'Conviso Asset ID'
        required: true
        type: string
      company_id:
        description: 'Conviso Company ID (Contexto)'
        required: true
        type: string

env:
  CONVISO_API_KEY: ${{ secrets.CONVISO_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  SCAN_ID: ${{ github.run_id }}

jobs:
  # 1. RECONHECIMENTO PASSIVO
  passive-recon:
    name: 🕵️ 1. Passive Recon
    runs-on: ubuntu-latest
    outputs:
      target_domain: ${{ steps.extract.outputs.domain }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install Tools
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/dnsx/cmd/dnsx@latest
          go install github.com/lc/gau/v2/cmd/gau@latest
          go install github.com/tomnomnom/waybackurls@latest
          go install github.com/tomnomnom/unfurl@latest
          go install github.com/tomnomnom/anew@latest
      
      - name: Extract Domain
        id: extract
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.target }}" | unfurl domains | head -1)
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT

      - name: Enumeration
        run: |
          mkdir -p passive
          # Subdomínios e DNS
          subfinder -d ${{ steps.extract.outputs.domain }} -silent -all -o passive/subdomains.txt
          echo "${{ steps.extract.outputs.domain }}" | dnsx -json -o passive/dns.json
          
          # URLs Passivas (Wayback/AlienVault)
          gau --threads 5 --subs ${{ steps.extract.outputs.domain }} > passive/urls_raw.txt
          echo "${{ steps.extract.outputs.domain }}" | waybackurls >> passive/urls_raw.txt
          cat passive/urls_raw.txt | anew passive/all-urls.txt
          
          # Extração de Parâmetros e Paths
          cat passive/all-urls.txt | unfurl paths | sort -u > passive/paths.txt
          
      - uses: actions/upload-artifact@v4
        with:
          name: passive-results
          path: passive/

  # 2. RECONHECIMENTO ATIVO (Roda sempre após o passivo)
  active-recon:
    name: 🎯 2. Active Recon
    runs-on: ubuntu-latest
    needs: passive-recon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: |
          go install github.com/ffuf/ffuf/v2@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - uses: actions/download-artifact@v4
        with:
          name: passive-results
          path: passive/

      - name: Active Probing
        run: |
          mkdir -p active
          # Validação de alvos vivos e Tech Detect
          cat passive/subdomains.txt | httpx -tech-detect -status-code -title -json -o active/live-hosts.json
          
          # Fuzzing rápido em diretórios principais (usando paths descobertos como base)
          head -n 200 passive/paths.txt > active/wordlist.txt
          ffuf -u "${{ github.event.inputs.target }}/FUZZ" -w active/wordlist.txt -mc 200,403,301 -rate 10 -json -o active/fuzzing.json

      - uses: actions/upload-artifact@v4
        with:
          name: active-results
          path: active/

  # 3. SCAN DE VULNERABILIDADES (Focado em Misconfig/Headers/Exposure)
  vuln-scan:
    name: 🧬 3. Vuln Scan (Misconfigs)
    runs-on: ubuntu-latest
    needs: active-recon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei -update-templates

      - uses: actions/download-artifact@v4
        with:
          name: passive-results
          path: passive-results/ # Actions baixa criando pasta com nome do artefato

      - name: Nuclei Scan
        run: |
          mkdir -p vulnerabilities
          # Prepara lista de alvos
          cat passive-results/subdomains.txt > targets.txt
          echo "${{ github.event.inputs.target }}" >> targets.txt
          sort -u targets.txt -o targets.txt

          # COMANDO ATUALIZADO: Inclui misconfiguration, config, headers, exposure
          # Inclui severidade 'low' para pegar headers de segurança faltantes
          nuclei -l targets.txt \
            -tags misconfiguration,config,exposure,http-headers,web-server,panel \
            -severity low,medium,high,critical \
            -rate-limit 50 \
            -json \
            -o vulnerabilities/nuclei.json

      - uses: actions/upload-artifact@v4
        with:
          name: vuln-results
          path: vulnerabilities/

  # 4. PROCESSAMENTO E IA
  process-and-ai:
    name: 🤖 4. Process & AI Analysis
    runs-on: ubuntu-latest
    needs: vuln-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      
      - uses: actions/download-artifact@v4
      
      - name: Normalize & Analyze
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 1. Normalizar (junta resultados se houver múltiplos)
          python3 scripts/normalize_findings.py "${{ github.event.inputs.target }}"
          
          # 2. Gerar Relatório IA
          python3 scripts/ai_analyzer.py

      - uses: actions/upload-artifact@v4
        with:
          name: final-artifacts
          path: |
            normalized-findings.json
            AI_RECON_REPORT.md

  # 5. INTEGRAÇÃO CONVISO
  conviso-integration:
    name: 📤 5. Send to Conviso
    runs-on: ubuntu-latest
    needs: process-and-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      
      - uses: actions/download-artifact@v4
        with:
          name: final-artifacts

      - name: Upload Findings
        env:
          CONVISO_API_KEY: ${{ secrets.CONVISO_API_KEY }}
        run: |
          python3 scripts/conviso_integration.py \
            normalized-findings.json \
            "${{ github.event.inputs.project_id }}" \
            "${{ github.event.inputs.asset_id }}" \
            "${{ github.event.inputs.company_id }}"
