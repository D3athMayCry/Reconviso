import json, os, time, urllib.request, urllib.error
from datetime import datetime, timezone

GEMINI_KEY = os.environ.get('GEMINI_API_KEY','')
DOMAIN     = os.environ.get('DOMAIN','')
SCAN_ID    = os.environ.get('SCAN_ID','')
MODEL      = 'gemini-2.0-flash'
GEMINI_URL = f'https://generativelanguage.googleapis.com/v1beta/models/{MODEL}:generateContent?key={GEMINI_KEY}'

# Carrega normalized-findings.json
with open('normalized/normalized-findings.json') as f:
    data = json.load(f)

meta    = data.get('meta',{})
summary = data.get('summary',{})
p1      = data.get('phase1_passive',{})
p2      = data.get('phase2_osint',{})
p3      = data.get('phase3_active',{})
p4      = data.get('phase4_vulns',{})

# ── Gemini helper ────────────────────────────────────────────────────────────
def gemini(prompt: str, max_tokens: int = 4096) -> str:
    if not GEMINI_KEY:
        return "⚠️  GEMINI_API_KEY não configurado. Adicione em Settings → Secrets → Actions."
    body = json.dumps({
        "contents": [{"parts": [{"text": prompt}]}],
        "generationConfig": {"maxOutputTokens": max_tokens, "temperature": 0.3}
    }).encode()
    req = urllib.request.Request(GEMINI_URL, data=body,
                                  headers={"Content-Type":"application/json"})
    for attempt in range(3):
        try:
            with urllib.request.urlopen(req, timeout=90) as resp:
                r = json.loads(resp.read())
                return r['candidates'][0]['content']['parts'][0]['text']
        except urllib.error.HTTPError as e:
            err = e.read().decode()
            if e.code == 429:
                print(f"Rate limit, aguardando {30*(attempt+1)}s...")
                time.sleep(30 * (attempt+1))
            else:
                return f"Gemini API error {e.code}: {err[:300]}"
        except Exception as e:
            print(f"Tentativa {attempt+1} falhou: {e}")
            time.sleep(15)
    return "Gemini não respondeu após 3 tentativas."

