# ╔══════════════════════════════════════════════════════════════════════════╗
# ║   🥷 ADVANCED OSINT & RECON FRAMEWORK — AI-Powered                      ║
# ║                                                                          ║
# ║   SECRETS (Settings → Secrets → Actions):                               ║
# ║     GEMINI_API_KEY     → aistudio.google.com/app/apikey                 ║
# ║     SHODAN_API_KEY     → account.shodan.io (opcional)                   ║
# ║     SECURITYTRAILS_KEY → securitytrails.com (opcional)                  ║
# ║     GITHUB_TOKEN       → injetado automaticamente                        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: "🥷 Advanced OSINT & Recon — AI Report"

on:
  workflow_dispatch:
    inputs:
      target:
        description: "🎯 Target Domain (ex: example.com)"
        required: true
        type: string
      scope:
        description: "📐 Scope (ex: *.example.com | vazio = auto)"
        required: false
        default: ""
      stealth_level:
        description: "🔇 Stealth Level"
        required: false
        type: choice
        options:
          - ultra
          - low
          - normal
        default: low
      scan_mode:
        description: "🔬 Scan Mode"
        required: true
        type: choice
        options:
          - "Discovery  — Rapido: exposicoes e configs"
          - "Targeted   — Inteligente: adapta a tecnologia"
          - "Aggressive — Completo: todos os templates"
        default: "Targeted   — Inteligente: adapta a tecnologia"
      nuclei_severities:
        description: "🚨 Nuclei Severities"
        required: false
        default: "low,medium,high,critical"
        type: string
      max_targets:
        description: "🔢 Max Subdomains to Scan"
        required: false
        default: "500"
        type: string
      enable_dorks:
        description: "🎣 Habilitar GitHub Dorks?"
        type: boolean
        default: true
      enable_portscan:
        description: "🔌 Habilitar Port Scan?"
        type: boolean
        default: true
      enable_screenshots:
        description: "📸 Habilitar Screenshots?"
        type: boolean
        default: false

env:
  SCAN_ID: ${{ github.run_id }}
  GO_VERSION: "1.23"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 0 — SETUP
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  setup:
    name: "⚙️ Setup & Config"
    runs-on: ubuntu-latest
    outputs:
      domain:    ${{ steps.extract.outputs.domain }}
      scope:     ${{ steps.extract.outputs.scope }}
      max_rate:  ${{ steps.stealth.outputs.max_rate }}
      threads:   ${{ steps.stealth.outputs.threads }}
      main_ip:   ${{ steps.meta.outputs.main_ip }}
      asn:       ${{ steps.meta.outputs.asn }}
      org:       ${{ steps.meta.outputs.org }}
      registrar: ${{ steps.meta.outputs.registrar }}
      tech_hint: ${{ steps.meta.outputs.tech_hint }}

    steps:
      - name: Extract Domain & Scope
        id: extract
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.target }}" \
            | sed 's|https\?://||;s|/.*||' | tr '[:upper:]' '[:lower:]' | xargs)
          SCOPE="${{ github.event.inputs.scope }}"
          [ -z "$SCOPE" ] && SCOPE="*.${DOMAIN},${DOMAIN}"
          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE"   >> $GITHUB_OUTPUT

      - name: Stealth Profile
        id: stealth
        run: |
          case "${{ github.event.inputs.stealth_level }}" in
            ultra)  MAX_RATE=3;  THREADS=5  ;;
            low)    MAX_RATE=5;  THREADS=10 ;;
            normal) MAX_RATE=15; THREADS=25 ;;
            *)      MAX_RATE=5;  THREADS=10 ;;
          esac
          echo "max_rate=$MAX_RATE" >> $GITHUB_OUTPUT
          echo "threads=$THREADS"   >> $GITHUB_OUTPUT

      - name: Collect ASN / WHOIS / Tech Metadata
        id: meta
        run: |
          DOMAIN="${{ steps.extract.outputs.domain }}"
          MAIN_IP=$(dig +short "$DOMAIN" | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1 || echo "unknown")
          ASN=$(curl -s "https://api.hackertarget.com/aslookup/?q=$MAIN_IP" \
                | grep -oP 'AS\d+' | head -1 || echo "unknown")
          ORG=$(whois "$DOMAIN" 2>/dev/null \
                | grep -iE '^(org|organisation|registrant org)' \
                | head -1 | cut -d: -f2- | xargs || echo "unknown")
          REG=$(whois "$DOMAIN" 2>/dev/null \
                | grep -i 'registrar:' | head -1 | cut -d: -f2- | xargs || echo "unknown")
          TECH=$(curl -sk -o /dev/null -D - "https://$DOMAIN" 2>/dev/null \
                 | grep -i '^server:' | cut -d: -f2- | xargs || echo "unknown")
          echo "main_ip=$MAIN_IP"   >> $GITHUB_OUTPUT
          echo "asn=$ASN"           >> $GITHUB_OUTPUT
          echo "org=$ORG"           >> $GITHUB_OUTPUT
          echo "registrar=$REG"     >> $GITHUB_OUTPUT
          echo "tech_hint=$TECH"    >> $GITHUB_OUTPUT

# ══════════════════════════════════════════════════════════════════════════════
# FASE 1 — PASSIVE RECON (matrix paralela)
# ══════════════════════════════════════════════════════════════════════════════
  phase1-passive:
    name: "🔍 Phase1 — ${{ matrix.type }}"
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        type: [subdomains, dns-ssl, wayback, tech-detection]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install Tools
        run: |
          case "${{ matrix.type }}" in
            subdomains)
              go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest &
              go install github.com/glebarez/cero@latest &
              wait ;;
            dns-ssl)
              go install github.com/projectdiscovery/dnsx/cmd/dnsx@latest &
              go install github.com/projectdiscovery/tlsx/cmd/tlsx@latest &
              wait ;;
            wayback)
              go install github.com/lc/gau/v2/cmd/gau@latest &
              go install github.com/tomnomnom/waybackurls@latest &
              go install github.com/tomnomnom/unfurl@latest &
              wait ;;
            tech-detection)
              go install github.com/projectdiscovery/httpx/cmd/httpx@latest ;;
          esac

      - name: Run Passive Recon
        env:
          DOMAIN:  ${{ needs.setup.outputs.domain }}
          MAIN_IP: ${{ needs.setup.outputs.main_ip }}
        run: |
          mkdir -p output

          case "${{ matrix.type }}" in

            subdomains)
              subfinder -d "$DOMAIN" -silent -t 50 -all -o output/subfinder.txt 2>/dev/null || true
              curl -s "https://crt.sh/?q=%25.$DOMAIN&output=json" \
                | jq -r '.[].name_value' 2>/dev/null \
                | sed 's/\*\.//g' | sort -u > output/crtsh.txt || true
              curl -s "https://rapiddns.io/subdomain/$DOMAIN?full=1" 2>/dev/null \
                | grep -oP "(?<=<td>)[a-z0-9._-]+\.$DOMAIN(?=</td>)" \
                | sort -u > output/rapiddns.txt || true
              curl -s "https://dns.bufferover.run/dns?q=.$DOMAIN" 2>/dev/null \
                | jq -r '.FDNS_A[],.RDNS[]' 2>/dev/null \
                | cut -d',' -f2 | grep -F ".$DOMAIN" | sort -u > output/bufferover.txt || true
              cero "$DOMAIN" 2>/dev/null | sort -u > output/cero.txt || true
              cat output/subfinder.txt output/crtsh.txt output/rapiddns.txt \
                  output/bufferover.txt output/cero.txt 2>/dev/null \
                | grep -vE '@|^\s*$' | sort -u > output/subdomains.txt
              echo "$DOMAIN" >> output/subdomains.txt
              sort -u -o output/subdomains.txt output/subdomains.txt
              echo "Subdomains: $(wc -l < output/subdomains.txt)"
              ;;

            dns-ssl)
              echo "$DOMAIN" | dnsx -silent -json \
                -a -aaaa -cname -mx -txt -ns -soa \
                -o output/dns_full.json 2>/dev/null || true
              for NS in $(dig +short NS "$DOMAIN" 2>/dev/null); do
                dig axfr "$DOMAIN" @"$NS" 2>/dev/null >> output/zone_transfer.txt || true
              done
              {
                echo "--- SPF ---"
                dig +short TXT "$DOMAIN" | grep -i 'v=spf' || echo "NO SPF FOUND"
                echo "--- DMARC ---"
                dig +short TXT "_dmarc.$DOMAIN" || echo "NO DMARC FOUND"
                echo "--- DKIM ---"
                for SEL in default google amazon ses mail dkim k1 smtp selector1; do
                  R=$(dig +short TXT "${SEL}._domainkey.$DOMAIN" 2>/dev/null)
                  [ -n "$R" ] && echo "selector=$SEL: $R"
                done
              } > output/email_security.txt
              echo "$DOMAIN" | tlsx -silent -json -san -cn -expired -self-signed \
                -o output/tls_analysis.json 2>/dev/null || true
              ;;

            wayback)
              gau --threads 5 --subs --retries 3 "$DOMAIN" \
                2>/dev/null > output/gau.txt || true
              echo "$DOMAIN" | waybackurls 2>/dev/null > output/wayback_raw.txt || true
              cat output/gau.txt output/wayback_raw.txt | sort -u > output/urls_all.txt
              cat output/urls_all.txt | unfurl keys | sort -u > output/params_get.txt || true
              cat output/urls_all.txt | unfurl paths | sort -u > output/paths.txt || true
              grep -iE '/(api|v[0-9]+|graphql|rest|ws|rpc)/' output/paths.txt \
                | sort -u > output/api_endpoints.txt || true
              grep -iE '\.(env|log|bak|sql|config|xml|json|yaml|yml|key|pem|cer|pfx|p12|htpasswd|DS_Store|git|svn|swp|old|backup|conf|ini|toml|ovpn)(\?|$)' \
                output/urls_all.txt | sort -u > output/urls_juicy.txt || true
              grep -iE '(login|signin|auth|upload|submit|register|reset|forgot|checkout|payment|transfer|oauth|callback|token|refresh)' \
                output/paths.txt | sort -u > output/post_endpoints.txt || true
              echo "URLs: $(wc -l < output/urls_all.txt) | Params: $(wc -l < output/params_get.txt) | Juicy: $(wc -l < output/urls_juicy.txt)"
              ;;

            tech-detection)
              echo "$DOMAIN" | httpx -silent -timeout 10 \
                -title -server -td -favicon \
                -json -o output/tech_main.json 2>/dev/null || true
              curl -sk "https://$DOMAIN/robots.txt"               > output/robots.txt       2>/dev/null || true
              curl -sk "https://$DOMAIN/sitemap.xml"              > output/sitemap.xml      2>/dev/null || true
              curl -sk "https://$DOMAIN/.well-known/security.txt" > output/security_txt.txt 2>/dev/null || true
              whois "$DOMAIN" > output/whois.txt 2>/dev/null || true
              curl -s "https://api.hackertarget.com/reverseiplookup/?q=$MAIN_IP" \
                > output/reverse_ip.txt 2>/dev/null || true
              curl -sk "https://$DOMAIN" 2>/dev/null \
                | grep -oP '(UA-\d+-\d+|G-[A-Z0-9]+|GTM-[A-Z0-9]+)' \
                | sort -u > output/analytics_ids.txt || true
              curl -s "https://urlscan.io/api/v1/search/?q=domain:$DOMAIN&size=30" \
                2>/dev/null | jq '{total:.total, results:[.results[] | {url:.page.url, ip:.page.ip, server:.page.server, date:.task.time}]}' \
                > output/urlscan.json || true
              ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: "phase1-${{ matrix.type }}"
          path: output/
          retention-days: 1

# ══════════════════════════════════════════════════════════════════════════════
# FASE 2 — OSINT ANALYSIS
# Nuclei custom templates + GitHub Dorks + Email Harvesting + Shodan
# ══════════════════════════════════════════════════════════════════════════════
  phase2-osint:
    name: "🎯 Phase2 — OSINT Analysis"
    runs-on: ubuntu-latest
    needs: [setup, phase1-passive]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install Tools
        run: |
          pip install -q theHarvester shodan 2>/dev/null || true
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei -update-templates 2>/dev/null || true

      - uses: actions/download-artifact@v4
        with:
          pattern: phase1-*
          merge-multiple: true
          path: phase1/

      - name: Nuclei OSINT Scan (Custom Templates)
        env:
          MAX_RATE:   ${{ needs.setup.outputs.max_rate }}
          THREADS:    ${{ needs.setup.outputs.threads }}
          DOMAIN:     ${{ needs.setup.outputs.domain }}
          SEVERITIES: ${{ github.event.inputs.nuclei_severities }}
        run: |
          mkdir -p output/nuclei_osint
          echo "https://$DOMAIN" > /tmp/targets.txt
          echo "http://$DOMAIN"  >> /tmp/targets.txt
          head -n 30 phase1/subdomains.txt 2>/dev/null \
            | sed 's|^|https://|' >> /tmp/targets.txt || true

          BASE="-c $THREADS -rl $MAX_RATE -timeout 5 -retries 0 -mhe 10 -silent -jsonl"

          nuclei -l /tmp/targets.txt \
            -t nuclei-templates/ \
            -severity "$SEVERITIES" \
            $BASE -o output/nuclei_osint/custom_scan.jsonl 2>/dev/null || true

          nuclei -l /tmp/targets.txt \
            -tags exposure,config,misconfig,token-spray \
            -severity "$SEVERITIES" \
            $BASE -o output/nuclei_osint/exposure_scan.jsonl 2>/dev/null || true

          echo "Nuclei OSINT: $(cat output/nuclei_osint/*.jsonl 2>/dev/null | wc -l) achados"

      - name: Google Dorks — estrutura
        if: ${{ github.event.inputs.enable_dorks == 'true' }}
        env:
          DOMAIN: ${{ needs.setup.outputs.domain }}
        run: |
          mkdir -p output/dorks
          cat > output/dorks/dorks_list.txt << DORKFILE
          site:$DOMAIN ext:env OR ext:log OR ext:bak OR ext:sql OR ext:conf
          site:$DOMAIN inurl:admin OR inurl:login OR inurl:dashboard OR inurl:portal
          site:$DOMAIN inurl:api OR inurl:swagger OR inurl:graphql OR inurl:v1
          site:$DOMAIN intitle:"index of" OR intitle:"directory listing"
          site:$DOMAIN filetype:pdf OR filetype:docx OR filetype:xlsx
          site:$DOMAIN intext:"api_key" OR intext:"secret" OR intext:"token"
          site:$DOMAIN inurl:.git OR inurl:.svn OR inurl:.env
          site:$DOMAIN inurl:config OR inurl:setup OR inurl:phpinfo
          site:$DOMAIN inurl:wp-content OR inurl:wp-admin
          site:$DOMAIN inurl:actuator OR inurl:kibana OR inurl:grafana
          site:$DOMAIN inurl:jenkins OR inurl:teamcity
          site:pastebin.com "$DOMAIN" password OR secret OR token
          site:github.com "$DOMAIN" password OR secret OR token
          site:github.com "$DOMAIN" PRIVATE_KEY OR DATABASE_URL
          site:github.com "$DOMAIN" AWS_SECRET OR SENDGRID OR STRIPE
          site:trello.com "$DOMAIN"
          site:s3.amazonaws.com "$DOMAIN"
          site:blob.core.windows.net "$DOMAIN"
          site:storage.googleapis.com "$DOMAIN"
          site:linkedin.com "at $DOMAIN" OR "@$DOMAIN"
          DORKFILE

          python3 - "$DOMAIN" output/dorks/dorks_structured.json << 'PYEOF'
          import json, sys, os
          domain = sys.argv[1]
          output = sys.argv[2]
          with open('output/dorks/dorks_list.txt') as f:
              dorks = [l.strip() for l in f if l.strip()]
          cats = {
              'sensitive_files':   [d for d in dorks if any(x in d for x in ['ext:','.git','.env','phpinfo'])],
              'admin_panels':      [d for d in dorks if any(x in d for x in ['admin','dashboard','jenkins','kibana','grafana'])],
              'api_endpoints':     [d for d in dorks if any(x in d for x in ['api','swagger','graphql'])],
              'credentials':       [d for d in dorks if any(x in d for x in ['password','token','secret','PRIVATE','AWS'])],
              'cloud_storage':     [d for d in dorks if any(x in d for x in ['s3.','blob.','storage.google'])],
              'code_repos':        [d for d in dorks if any(x in d for x in ['github.com','pastebin'])],
              'social_media':      [d for d in dorks if any(x in d for x in ['linkedin','trello'])],
          }
          os.makedirs(os.path.dirname(output), exist_ok=True)
          with open(output, 'w') as f:
              json.dump({'domain': domain, 'total_dorks': len(dorks), 'categories': cats, 'dorks': dorks}, f, indent=2)
          print(f"Dorks: {len(dorks)} em {len(cats)} categorias")
          PYEOF

      - name: GitHub Dorks
        if: ${{ github.event.inputs.enable_dorks == 'true' }}
        env:
          DOMAIN:       ${{ needs.setup.outputs.domain }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/github_dorks.py "$DOMAIN" output/dorks/github_findings.json

      - name: Email Harvesting + Shodan
        env:
          DOMAIN:         ${{ needs.setup.outputs.domain }}
          MAIN_IP:        ${{ needs.setup.outputs.main_ip }}
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
        run: |
          mkdir -p output/osint
          timeout 120 theHarvester -d "$DOMAIN" -l 300 \
            -b bing,duckduckgo,yahoo,certspotter,crtsh \
            -f output/osint/harvester 2>/dev/null || true

          if [ -n "$SHODAN_API_KEY" ]; then
            python3 - "$DOMAIN" "$SHODAN_API_KEY" output/osint/shodan.json << 'PYEOF'
            import shodan, json, sys
            domain, key, output = sys.argv[1], sys.argv[2], sys.argv[3]
            try:
                api = shodan.Shodan(key)
                r   = api.search(f'hostname:{domain}')
                results = []
                cves = []
                for h in r.get('matches', []):
                    entry = {'ip': h.get('ip_str'), 'port': h.get('port'),
                             'product': h.get('product',''), 'version': h.get('version',''),
                             'os': h.get('os',''), 'cves': list(h.get('vulns',{}).keys()),
                             'banner': h.get('data','')[:200]}
                    results.append(entry)
                    cves.extend(entry['cves'])
                with open(output, 'w') as f:
                    json.dump({'domain_results': results, 'cves': list(set(cves))}, f, indent=2)
                print(f"Shodan: {len(results)} hosts | CVEs: {list(set(cves))}")
            except Exception as e:
                print(f"Shodan error: {e}")
                with open(output, 'w') as f:
                    json.dump({'error': str(e), 'domain_results': [], 'cves': []}, f)
            PYEOF
          else
            curl -s "https://api.hackertarget.com/hostsearch/?q=$DOMAIN" \
              > output/osint/hackertarget.txt 2>/dev/null || true
            curl -s "https://api.hackertarget.com/nmap/?q=$MAIN_IP" \
              > output/osint/nmap_quick.txt 2>/dev/null || true
            echo '{"domain_results":[],"cves":[],"note":"No SHODAN_API_KEY"}' \
              > output/osint/shodan.json
          fi

          curl -s "https://urlscan.io/api/v1/search/?q=domain:$DOMAIN&size=30" \
            2>/dev/null | jq '{total:.total, results:[.results[] | {url:.page.url,ip:.page.ip,server:.page.server}]}' \
            > output/osint/urlscan.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: phase2-osint
          path: output/
          retention-days: 1

# ══════════════════════════════════════════════════════════════════════════════
# FASE 3 — ACTIVE RECON
# httpx + ffuf (rate-limited) + JS Analysis + Screenshots
# ══════════════════════════════════════════════════════════════════════════════
  phase3-active:
    name: "🟢 Phase3 — Active Recon"
    runs-on: ubuntu-latest
    needs: [setup, phase1-passive]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install Tools
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest &
          go install github.com/ffuf/ffuf/v2@latest                      &
          go install github.com/sensepost/gowitness@latest               &
          wait

      - uses: actions/download-artifact@v4
        with:
          pattern: phase1-*
          merge-multiple: true
          path: phase1/

      - name: HTTP Probing (httpx)
        env:
          MAX_RATE:    ${{ needs.setup.outputs.max_rate }}
          THREADS:     ${{ needs.setup.outputs.threads }}
          MAX_TARGETS: ${{ github.event.inputs.max_targets || '500' }}
        run: |
          mkdir -p output/active
          head -n "$MAX_TARGETS" phase1/subdomains.txt 2>/dev/null \
            | httpx -silent \
                -threads "$THREADS" \
                -rate-limit "$MAX_RATE" \
                -timeout 5 \
                -p 80,443,8080,8443,8888,3000,4443,9090,9200,5601 \
                -sc -title -td -server -location -favicon \
                -json -o output/active/live.json 2>/dev/null || true
          jq -r '.url' output/active/live.json 2>/dev/null \
            | sort -u > output/active/live_urls.txt || true
          echo "Live: $(wc -l < output/active/live_urls.txt 2>/dev/null || echo 0) hosts"

          if [ "${{ github.event.inputs.enable_portscan }}" = "true" ]; then
            MAIN_IP="${{ needs.setup.outputs.main_ip }}"
            curl -s "https://api.hackertarget.com/nmap/?q=$MAIN_IP" \
              > output/active/portscan.txt 2>/dev/null || true
          fi

      - name: Directory Fuzzing (ffuf — rate limited)
        env:
          MAX_RATE: ${{ needs.setup.outputs.max_rate }}
        run: |
          mkdir -p output/dirs
          WORDLIST="scripts/wordlist.txt"
          if [ ! -f "$WORDLIST" ]; then
            WORDLIST="/tmp/wl.txt"
            printf ".git\n.git/config\n.env\n.env.local\n.env.production\nconfig.json\nconfig.yaml\nadmin\nadmin/login\napi\napi/v1\napi/v2\nswagger\nswagger.json\nopenapi.json\ngraphql\nphpinfo.php\nrobots.txt\nbackup\nbackup.zip\nwp-admin\nwp-login.php\njenkins\nactuator\nactuator/health\nactuator/env\nconsole\nphpmyadmin\nserver-status\nserver-info\nkibana\ngrafana\nprometheus\nmetrics\nhealth\nlogin\nupload\n.htaccess\n.htpasswd\nweb.config\n" > "$WORDLIST"
          fi
          head -n 5 output/active/live_urls.txt 2>/dev/null \
          | while IFS= read -r TARGET; do
            SAFE=$(echo "$TARGET" | sed 's|[^a-zA-Z0-9]|_|g')
            ffuf -u "${TARGET}/FUZZ" -w "$WORDLIST" \
                 -rate "$MAX_RATE" -timeout 5 \
                 -mc 200,204,301,302,401,403 -fc 404 -t 5 \
                 -o "output/dirs/ffuf_${SAFE}.json" -of json -s 2>/dev/null || true
          done || true
          python3 - << 'PYEOF'
          import json, glob
          results = []
          for fp in glob.glob('output/dirs/ffuf_*.json'):
              try:
                  with open(fp) as f:
                      for r in json.load(f).get('results', []):
                          results.append({'url': r.get('url'), 'status': r.get('status'), 'length': r.get('length')})
              except: pass
          with open('output/dirs/ffuf_consolidated.json', 'w') as f:
              json.dump({'total': len(results), 'results': results}, f, indent=2)
          print(f"ffuf: {len(results)} paths encontrados")
          PYEOF

      - name: JavaScript Analysis
        env:
          DOMAIN: ${{ needs.setup.outputs.domain }}
        run: |
          mkdir -p output/js
          python3 scripts/js_analysis.py "$DOMAIN" output/js/js_analysis.json

      - name: Screenshots (gowitness)
        if: ${{ github.event.inputs.enable_screenshots == 'true' }}
        run: |
          mkdir -p output/screenshots
          gowitness scan file \
            --input-file output/active/live_urls.txt \
            --screenshot-path output/screenshots \
            --timeout 10 --threads 3 --delay 2 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: phase3-active
          path: output/
          retention-days: 1

# ══════════════════════════════════════════════════════════════════════════════
# FASE 4 — VULNERABILITY SCANNING
# Nuclei Full Scan → filtrado por severidade
# ══════════════════════════════════════════════════════════════════════════════
  phase4-vuln:
    name: "🚨 Phase4 — Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [setup, phase1-passive, phase3-active]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Nuclei
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei -update-templates 2>/dev/null || true

      - uses: actions/download-artifact@v4
        with:
          pattern: phase1-*
          merge-multiple: true
          path: phase1/

      - uses: actions/download-artifact@v4
        with:
          name: phase3-active
          path: phase3/

      - name: Nuclei Full Scan
        env:
          MAX_RATE:    ${{ needs.setup.outputs.max_rate }}
          THREADS:     ${{ needs.setup.outputs.threads }}
          SEVERITIES:  ${{ github.event.inputs.nuclei_severities || 'low,medium,high,critical' }}
          MODE:        ${{ github.event.inputs.scan_mode }}
          MAX_TARGETS: ${{ github.event.inputs.max_targets || '500' }}
        run: |
          mkdir -p output/vuln
          head -n "$MAX_TARGETS" phase1/subdomains.txt 2>/dev/null > /tmp/targets.txt || true
          jq -r '.url' phase3/active/live.json 2>/dev/null >> /tmp/targets.txt || true
          sort -u /tmp/targets.txt -o /tmp/targets.txt
          echo "Targets: $(wc -l < /tmp/targets.txt)"

          BASE="-l /tmp/targets.txt -severity $SEVERITIES -c $THREADS -rl $MAX_RATE -timeout 5 -retries 0 -mhe 15 -silent -jsonl"

          case "$MODE" in
            *Discovery*)
              nuclei $BASE -tags exposure,config,misconfig \
                -o output/vuln/nuclei_results.jsonl 2>/dev/null || true ;;
            *Aggressive*)
              nuclei $BASE \
                -tags misconfiguration,http-headers,cve,file,exposure,default-login,panel,rce,ssrf,sqli,xss,lfi \
                -o output/vuln/nuclei_results.jsonl 2>/dev/null || true ;;
            *)
              nuclei $BASE -as -o output/vuln/nuclei_targeted.jsonl 2>/dev/null || true
              nuclei $BASE -tags cve,default-login -o output/vuln/nuclei_cves.jsonl 2>/dev/null || true
              cat output/vuln/nuclei_targeted.jsonl output/vuln/nuclei_cves.jsonl \
                > output/vuln/nuclei_results.jsonl 2>/dev/null || true ;;
          esac

          python3 - << 'PYEOF'
          import json, glob
          all_findings, seen = [], set()
          for fp in glob.glob('output/vuln/*.jsonl'):
              with open(fp) as fh:
                  for line in fh:
                      line = line.strip()
                      if not line: continue
                      try:
                          item = json.loads(line)
                          key = f"{item.get('template-id','')}{item.get('matched-at','')}"
                          if key not in seen:
                              seen.add(key)
                              all_findings.append(item)
                      except: pass
          by_sev = {}
          for f in all_findings:
              s = f.get('info',{}).get('severity','info').lower()
              by_sev.setdefault(s, []).append(f)
          print(f"Nuclei results: { {k:len(v) for k,v in by_sev.items()} }")
          for sev, items in by_sev.items():
              if items:
                  with open(f'output/vuln/severity_{sev}.json', 'w') as f:
                      json.dump(items, f, indent=2)
          with open('output/vuln/all_findings.json', 'w') as f:
              json.dump({'summary': {k:len(v) for k,v in by_sev.items()}, 'findings': all_findings}, f, indent=2)
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: phase4-vuln
          path: output/vuln/
          retention-days: 1

# ══════════════════════════════════════════════════════════════════════════════
# FASE 5 — DATA PROCESSING
# normalize.py: Merge → Dedup → Classify → Enrich → normalized-findings.json
# ══════════════════════════════════════════════════════════════════════════════
  phase5-normalize:
    name: "📊 Phase5 — Data Processing"
    runs-on: ubuntu-latest
    needs: [setup, phase1-passive, phase2-osint, phase3-active, phase4-vuln]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: phase1-*
          merge-multiple: true
          path: all/phase1/

      - uses: actions/download-artifact@v4
        with:
          name: phase2-osint
          path: all/phase2/

      - uses: actions/download-artifact@v4
        with:
          name: phase3-active
          path: all/phase3/

      - uses: actions/download-artifact@v4
        with:
          name: phase4-vuln
          path: all/phase4/

      - name: Normalize Findings
        env:
          DOMAIN:        ${{ needs.setup.outputs.domain }}
          MAIN_IP:       ${{ needs.setup.outputs.main_ip }}
          ASN:           ${{ needs.setup.outputs.asn }}
          ORG:           ${{ needs.setup.outputs.org }}
          REGISTRAR:     ${{ needs.setup.outputs.registrar }}
          TECH_HINT:     ${{ needs.setup.outputs.tech_hint }}
          SCAN_ID:       ${{ env.SCAN_ID }}
          SCAN_MODE:     ${{ github.event.inputs.scan_mode }}
          STEALTH_LEVEL: ${{ github.event.inputs.stealth_level }}
        run: |
          mkdir -p output
          python3 scripts/normalize.py

      - uses: actions/upload-artifact@v4
        with:
          name: phase5-normalized
          path: output/normalized-findings.json
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# FASE 6 — AI REPORT (Gemini 2.0 Flash)
# gemini_report.py: Correlação → Attack Chains → Threat Intel → RECON-REPORT.md
# ══════════════════════════════════════════════════════════════════════════════
  phase6-ai-report:
    name: "🤖 Phase6 — Gemini AI Report"
    runs-on: ubuntu-latest
    needs: [setup, phase5-normalize]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: phase5-normalized
          path: normalized/

      - name: Generate AI Report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DOMAIN:         ${{ needs.setup.outputs.domain }}
          SCAN_ID:        ${{ env.SCAN_ID }}
        run: |
          python3 scripts/gemini_report.py \
            normalized/normalized-findings.json \
            "$DOMAIN" \
            "$SCAN_ID"

      - uses: actions/upload-artifact@v4
        with:
          name: "FINAL-REPORT-${{ needs.setup.outputs.domain }}"
          path: output/report/
          retention-days: 30

      - name: Job Summary
        env:
          DOMAIN: ${{ needs.setup.outputs.domain }}
        run: |
          echo "## 🥷 Recon Concluído — \`$DOMAIN\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 - << 'PYEOF'
          import json, os
          try:
              with open('output/report/ai_analysis.json') as f:
                  d = json.load(f)
              s = d.get('summary', {})
              rows = [
                  ('🌐 Subdomains', s.get('subdomains_total', 0)),
                  ('🟢 Live Hosts', s.get('live_hosts', 0)),
                  ('🔴 Critical',   s.get('vulns_critical', 0)),
                  ('🟠 High',       s.get('vulns_high', 0)),
                  ('🟡 Medium',     s.get('vulns_medium', 0)),
                  ('🐙 GitHub Leaks', s.get('github_leaks', 0)),
                  ('🔑 JS Secrets', s.get('js_secrets', 0)),
                  ('💀 CVEs',       s.get('exposed_cves', 0)),
              ]
              print('| Métrica | Total |')
              print('|:---|:---|')
              for k, v in rows:
                  print(f'| {k} | **{v}** |')
          except Exception as e:
              print(f'Error reading summary: {e}')
          PYEOF
          >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Baixar:** Actions → Artifacts → \`FINAL-REPORT-$DOMAIN\`" >> $GITHUB_STEP_SUMMARY
