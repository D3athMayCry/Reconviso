      - "{{BaseURL}}/admin.php"
      - "{{BaseURL}}/manager"
      - "{{BaseURL}}/management"
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/signin"
      - "{{BaseURL}}/dashboard"
      - "{{BaseURL}}/portal"
      - "{{BaseURL}}/console"
      - "{{BaseURL}}/backend"
      - "{{BaseURL}}/backoffice"
      - "{{BaseURL}}/adminer"
      - "{{BaseURL}}/adminer.php"
      - "{{BaseURL}}/phpmyadmin"
      - "{{BaseURL}}/phpMyAdmin"
      - "{{BaseURL}}/pma"
      - "{{BaseURL}}/dbadmin"
      - "{{BaseURL}}/jenkins"
      - "{{BaseURL}}/grafana"
      - "{{BaseURL}}/kibana"
      - "{{BaseURL}}/prometheus"
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/actuator/env"
      - "{{BaseURL}}/actuator/health"
      - "{{BaseURL}}/actuator/mappings"
      - "{{BaseURL}}/_cat/indices"
      - "{{BaseURL}}/_cluster/health"
    matchers-condition: and
    matchers:
      - type: status
        status: [200, 301, 302, 401, 403]
      - type: word
        condition: or
        case-insensitive: true
        words:
          - "admin"
          - "login"
          - "dashboard"
          - "sign in"
          - "username"
          - "password"
          - "authentication"
          - "control panel"
          - "management"
    extractors:
      - type: regex
        regex:
          - '<title>([^<]+)</title>'
YAML

          # ── Custom Template: Info Disclosure ──────────────────────────────
          cat > /tmp/custom-tpl/info-disclosure.yaml << 'YAML'
id: custom-info-disclosure
info:
  name: Information Disclosure Detection
  author: OSINT Recon Pipeline
  severity: low
  tags: disclosure,info,debug
http:
  - method: GET
    path:
      - "{{BaseURL}}/phpinfo.php"
      - "{{BaseURL}}/info.php"
      - "{{BaseURL}}/test.php"
      - "{{BaseURL}}/server-status"
      - "{{BaseURL}}/server-info"
      - "{{BaseURL}}/status"
      - "{{BaseURL}}/.well-known/security.txt"
      - "{{BaseURL}}/robots.txt"
      - "{{BaseURL}}/sitemap.xml"
      - "{{BaseURL}}/crossdomain.xml"
      - "{{BaseURL}}/clientaccesspolicy.xml"
    matchers-condition: or
    matchers:
      - type: word
        condition: or
        words:
          - "PHP Version"
          - "phpinfo()"
          - "Apache Server Status"
          - "Server Information"
      - type: word
        condition: or
        words:
          - "Disallow:"
          - "<urlset"
    extractors:
      - type: regex
        name: php_version
        group: 1
        regex:
          - 'PHP Version ([0-9.]+)'
      - type: regex
        name: email
