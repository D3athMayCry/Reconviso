import re, json, os, urllib.request, urllib.error

PATTERNS = {
    'aws_access_key':   r'AKIA[0-9A-Z]{16}',
    'aws_secret_key':   r'(?i)aws[_-]?secret[_-]?access[_-]?key\s*[=:]\s*["\x27]?([A-Za-z0-9/+=]{40})',
    'google_api_key':   r'AIza[0-9A-Za-z\-_]{35}',
    'github_token':     r'ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82}',
    'jwt_token':        r'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+',
    'bearer_token':     r'(?i)bearer\s+([A-Za-z0-9\-_.]{20,})',
    'api_key_generic':  r'(?i)(api[_-]?key|apikey)["\s]*[:=]["\s]*([A-Za-z0-9\-_]{20,})',
    'password_in_js':   r'(?i)(password|passwd|pwd)["\s]*[:=]["\s]*["\x27]([^"\']{6,})["\x27]',
    'private_key':      r'-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----',
    'internal_ips':     r'(?:10|172\.(?:1[6-9]|2\d|3[01])|192\.168)\.\d{1,3}\.\d{1,3}',
    'stripe_key':       r'sk_live_[0-9a-zA-Z]{24}',
    'sendgrid_key':     r'SG\.[A-Za-z0-9\-_]{22}\.[A-Za-z0-9\-_]{43}',
    'slack_token':      r'xox[baprs]-([0-9a-zA-Z]{10,48})',
    'firebase_url':     r'https://[a-z0-9-]+\.firebaseio\.com',
}

SEV = {
    'aws_access_key':'critical','private_key':'critical','stripe_key':'critical',
    'github_token':'critical','sendgrid_key':'high','api_key_generic':'high',
    'password_in_js':'high','slack_token':'high','google_api_key':'high',
    'jwt_token':'medium','bearer_token':'medium',
    'internal_ips':'low','firebase_url':'medium',
}

domain = os.environ.get('DOMAIN','')
findings, js_files = [], []

try:
    req = urllib.request.Request(f'https://{domain}',
                                  headers={'User-Agent':'Mozilla/5.0 (compatible; Googlebot/2.1)'})
    html = urllib.request.urlopen(req, timeout=10).read().decode('utf-8','ignore')
    for js in re.findall(r'src=["\x27]([^"\']+\.js[^"\']*)["\x27]', html):
        if js.startswith('http'):       js_files.append(js)
        elif js.startswith('//'):       js_files.append('https:'+js)
        elif js.startswith('/'):        js_files.append(f'https://{domain}{js}')
except Exception as e:
    print(f"HTML fetch: {e}")

for url in js_files[:25]:
    try:
        req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
        content = urllib.request.urlopen(req, timeout=8).read().decode('utf-8','ignore')
        for pname, pattern in PATTERNS.items():
            if re.search(pattern, content):
                matches = re.findall(pattern, content)
                findings.append({'url':url,'type':pname,
                    'severity': SEV.get(pname,'medium'),
                    'matches': [str(m)[:100] for m in matches[:3]]})
    except: pass

result = {'total_js_files':len(js_files),'total_findings':len(findings),'findings':findings,'js_urls':js_files}
with open('output/js/js_analysis.json','w') as f:
    json.dump(result, f, indent=2)

crit = [x for x in findings if x['severity']=='critical']
print(f"🔑 JS: {len(js_files)} arquivos | {len(findings)} achados | {len(crit)} críticos")
