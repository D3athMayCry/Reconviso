# ══════════════════════════════════════════════════════════════════════════════
# FASE 4 ── VULNERABILITY SCANNING
# Nuclei Full Scan → Filter by Severity (Critical / High / Medium / Low)
# ══════════════════════════════════════════════════════════════════════════════
  phase4-vuln:
    name: "🚨 Phase4 — Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [setup, phase1-passive, phase3-active]

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Nuclei
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          nuclei -update-templates 2>/dev/null || true

      - uses: actions/download-artifact@v4
        with:
          pattern: phase1-*
          merge-multiple: true
          path: phase1/

      - uses: actions/download-artifact@v4
        with:
          name: phase3-active
          path: phase3/

      - name: Nuclei Full Scan
        env:
          MAX_RATE:    ${{ needs.setup.outputs.max_rate }}
          THREADS:     ${{ needs.setup.outputs.threads }}
          SEVERITIES:  ${{ github.event.inputs.nuclei_severities || 'low,medium,high,critical' }}
          MODE:        ${{ github.event.inputs.scan_mode }}
          MAX_TARGETS: ${{ github.event.inputs.max_targets || '500' }}
        run: |
          mkdir -p output/vuln

          head -n "$MAX_TARGETS" phase1/subdomains.txt 2>/dev/null > /tmp/targets.txt || true
          jq -r '.url' phase3/live.json 2>/dev/null >> /tmp/targets.txt || true
          sort -u /tmp/targets.txt -o /tmp/targets.txt
          echo "🎯 $(wc -l < /tmp/targets.txt) targets"

          BASE="-l /tmp/targets.txt -severity $SEVERITIES -c $THREADS -rl $MAX_RATE -timeout 5 -retries 0 -mhe 15 -silent -jsonl"

          case "$MODE" in
            *"Discovery"*)
              nuclei $BASE -tags exposure,config,misconfig,token-spray \
                -o output/vuln/nuclei_results.jsonl 2>/dev/null || true
              ;;
            *"Aggressive"*)
              nuclei $BASE \
                -tags misconfiguration,http-headers,cve,file,exposure,default-login,panel,rce,ssrf,sqli,xss,lfi,redirect \
                -o output/vuln/nuclei_results.jsonl 2>/dev/null || true
              ;;
            *)
              # Targeted: auto-scan tech + CVEs
              nuclei $BASE -as \
                -o output/vuln/nuclei_targeted.jsonl 2>/dev/null || true
              nuclei $BASE -tags cve,default-login \
                -o output/vuln/nuclei_cves.jsonl 2>/dev/null || true
              cat output/vuln/nuclei_targeted.jsonl output/vuln/nuclei_cves.jsonl \
                > output/vuln/nuclei_results.jsonl 2>/dev/null || true
              ;;
          esac

          # Classifica por severidade
          python3 << 'PYEOF'
import json, glob

all_findings, seen = [], set()
for f in glob.glob('output/vuln/*.jsonl'):
    with open(f) as fh:
        for line in fh:
            line = line.strip()
            if not line: continue
            try:
                item = json.loads(line)
                key = f"{item.get('template-id','')}{item.get('host','')}{item.get('matched-at','')}"
                if key not in seen:
                    seen.add(key)
                    all_findings.append(item)
            except: pass

by_sev = {'critical':[],'high':[],'medium':[],'low':[],'info':[]}
for f in all_findings:
    s = f.get('info',{}).get('severity','info').lower()
    by_sev.setdefault(s,[]).append(f)

summary = {k:len(v) for k,v in by_sev.items()}
print(f"🚨 Nuclei → {summary}")

for sev, items in by_sev.items():
    if items:
        with open(f'output/vuln/severity_{sev}.json','w') as f:
            json.dump(items, f, indent=2)

with open('output/vuln/all_findings.json','w') as f:
    json.dump({'summary':summary,'findings':all_findings}, f, indent=2)

print(f"✅ Total: {len(all_findings)} vulnerabilidades")
PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: phase4-vuln
          path: output/vuln/
